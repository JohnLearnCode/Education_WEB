version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: education-web-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - education-network

  redis:
    image: redis:7-alpine
    container_name: education-web-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - education-network

networks:
  education-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
